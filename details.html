<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxyTrace · Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { background-color: #070b0f; color: #e0f4ff; font-family: 'IBM Plex Mono', monospace; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .input-field {
      background: rgba(13, 21, 32, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    .input-field:focus { border-color: #00d4ff; outline: none; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-sm mb-8 flex gap-2">
    <div class="h-1 flex-1 bg-cyan-500 rounded shadow-[0_0_10px_#00d4ff]"></div>
    <div class="h-1 flex-1 bg-gray-800 rounded"></div>
  </div>

  <div class="w-full max-w-sm">
    <h2 class="text-2xl font-orbitron text-white mb-2">User Identity</h2>
    <p class="text-gray-400 text-xs mb-8">Basic biometrics for risk calibration.</p>
    
    <form onsubmit="saveDetails(event)" class="space-y-5">
      <div>
        <label class="block text-[10px] text-cyan-500 mb-1 tracking-wider">FULL NAME</label>
        <input type="text" id="name" required class="input-field w-full rounded p-3 text-white">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] text-cyan-500 mb-1 tracking-wider">AGE</label>
          <input type="number" id="age" required class="input-field w-full rounded p-3 text-white">
        </div>
        <div>
          <label class="block text-[10px] text-cyan-500 mb-1 tracking-wider">GENDER</label>
          <select id="gender" class="input-field w-full rounded p-3 text-white bg-[#0d1520]">
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold font-orbitron py-3.5 rounded mt-8 transition-colors">
        NEXT STEP →
      </button>
    </form>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name   = document.getElementById('name').value;
      const age    = document.getElementById('age').value;
      const gender = document.getElementById('gender').value;

      // Save to localStorage
      localStorage.setItem('oxy_username', name);
      localStorage.setItem('oxy_age', age);

      // Save to Firebase
      try {
        const user = auth.currentUser;
        if (user) {
          await updateDoc(doc(db, 'users', user.uid), { name, age, gender });
          console.log('✅ Details saved to Firebase');
        }
      } catch(e) {
        console.warn('Firebase update failed:', e.message);
      }

      window.location.href = 'health-survey.html';
    });
  </script>
</body>
</html>
