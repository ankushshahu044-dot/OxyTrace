<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxyTrace · Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { background-color: #070b0f; color: #e0f4ff; font-family: 'IBM Plex Mono', monospace; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .input-field {
      background: rgba(13, 21, 32, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.2);
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
      outline: none;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">

  <div class="absolute inset-0 z-0 opacity-20 pointer-events-none"
       style="background-image: radial-gradient(#00d4ff 1px, transparent 1px); background-size: 32px 32px;">
  </div>

  <div class="z-10 w-full max-w-sm">
    <div class="text-center mb-10">
      <div class="w-16 h-16 mx-auto mb-4 rounded-xl flex items-center justify-center border border-cyan-500/30 bg-cyan-900/10 backdrop-blur-md">
        <svg class="w-8 h-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.131A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.2-2.858.59-4.18" />
        </svg>
      </div>
      <h1 class="text-3xl font-orbitron font-bold text-white tracking-widest">OXYTRACE</h1>
      <p class="text-cyan-500/60 text-xs tracking-[0.2em] mt-2">SECURE HEALTH ACCESS</p>
    </div>

    <!-- Tab switcher -->
    <div class="flex mb-6 border border-cyan-500/20 rounded-lg overflow-hidden">
      <button id="tab-login" onclick="switchTab('login')"
        class="flex-1 py-2 text-xs font-orbitron bg-cyan-500/20 text-cyan-400 transition-all">
        SIGN IN
      </button>
      <button id="tab-signup" onclick="switchTab('signup')"
        class="flex-1 py-2 text-xs font-orbitron text-gray-500 transition-all">
        CREATE ACCOUNT
      </button>
    </div>

    <div class="space-y-5">
      <!-- Username field (signup only) -->
      <div id="field-username" class="hidden">
        <label class="block text-[10px] font-bold text-cyan-500 mb-1 tracking-wider">USERNAME</label>
        <input type="text" id="username" placeholder="your name"
          class="input-field w-full rounded-lg px-4 py-3 text-cyan-100 placeholder-cyan-800/50">
      </div>

      <div>
        <label class="block text-[10px] font-bold text-cyan-500 mb-1 tracking-wider">EMAIL ID</label>
        <input type="email" id="email" required placeholder="user@example.com"
          class="input-field w-full rounded-lg px-4 py-3 text-cyan-100 placeholder-cyan-800/50">
      </div>

      <div>
        <label class="block text-[10px] font-bold text-cyan-500 mb-1 tracking-wider">PASSWORD</label>
        <input type="password" id="password" required placeholder="••••••••"
          class="input-field w-full rounded-lg px-4 py-3 text-cyan-100 placeholder-cyan-800/50">
      </div>

      <div id="error-msg" class="text-red-400 text-xs text-center hidden"></div>

      <button id="btn-submit"
        class="w-full mt-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold font-orbitron py-3.5 rounded-lg shadow-[0_0_20px_rgba(0,212,255,0.3)] hover:shadow-[0_0_30px_rgba(0,212,255,0.5)] transition-all">
        AUTHENTICATE
      </button>
    </div>
  </div>

  <script type="module">
    import { signIn, signUp } from './firebase.js';

    let currentTab = 'login';

    window.switchTab = function(tab) {
      currentTab = tab;
      const isSignup = tab === 'signup';
      document.getElementById('field-username').classList.toggle('hidden', !isSignup);
      document.getElementById('tab-login').classList.toggle('bg-cyan-500/20', !isSignup);
      document.getElementById('tab-login').classList.toggle('text-cyan-400', !isSignup);
      document.getElementById('tab-signup').classList.toggle('bg-cyan-500/20', isSignup);
      document.getElementById('tab-signup').classList.toggle('text-cyan-400', isSignup);
      document.getElementById('btn-submit').textContent = isSignup ? 'CREATE ACCOUNT' : 'AUTHENTICATE';
      document.getElementById('error-msg').classList.add('hidden');
    }

    document.getElementById('btn-submit').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value.trim();
      const errEl    = document.getElementById('error-msg');
      errEl.classList.add('hidden');

      try {
        if (currentTab === 'login') {
          await signIn(email, password);
          window.location.href = 'index.html';
        } else {
          if (!username) { errEl.textContent = 'Please enter a username.'; errEl.classList.remove('hidden'); return; }
          await signUp(email, password, username);
          localStorage.setItem('oxy_username', username);
          window.location.href = 'details.html';
        }
      } catch(e) {
        errEl.textContent = e.message.replace('Firebase: ', '');
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
